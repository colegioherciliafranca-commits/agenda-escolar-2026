<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar VLibras Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .text-area {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: vertical;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        
        .btn:hover {
            background: #5a67d8;
        }
        
        .instructions {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .instructions h4 {
            color: #155724;
            margin-bottom: 10px;
        }
        
        .instructions p {
            color: #155724;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avatar VLibras - Tradutor Simples</h1>
        
        <textarea id="textInput" class="text-area" placeholder="Digite o texto que você quer traduzir para Libras...

Exemplo: Bom dia a todos. Sejam bem-vindos à nossa aula de biologia.">BIOLOGIA 1ª SÉRIE CÉLULA VEGETAL AULA 16</textarea>
        
        <button class="btn" onclick="traduzirTexto()">Traduzir para Libras</button>
        
        <div class="instructions">
            <h4>Como usar o Avatar VLibras:</h4>
            <p>1. Digite ou cole o texto acima</p>
            <p>2. Clique em "Traduzir para Libras"</p>
            <p>3. Procure o botão das mãozinhas no canto inferior direito</p>
            <p>4. Clique no botão para ver o avatar 3D traduzindo</p>
        </div>
    </div>

    <!-- VLibras Widget -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div vw-plugin-name="VP">
                <p id="vlibrasContent">BIOLOGIA 1ª SÉRIE CÉLULA VEGETAL AULA 16</p>
            </div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        function traduzirTexto() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('Digite um texto para traduzir');
                return;
            }
            
            // Atualizar conteúdo do VLibras
            document.getElementById('vlibrasContent').textContent = text;
            
            // Reinicializar VLibras
            try {
                if (window.VLibras) {
                    new window.VLibras.Widget('https://vlibras.gov.br/app');
                    console.log('VLibras inicializado com texto:', text);
                } else {
                    console.error('VLibras não disponível');
                }
            } catch (error) {
                console.error('Erro ao inicializar VLibras:', error);
            }
        }
        
        // Inicializar VLibras quando a página carregar
        window.addEventListener('load', function() {
            setTimeout(() => {
                try {
                    if (window.VLibras) {
                        new window.VLibras.Widget('https://vlibras.gov.br/app');
                        console.log('VLibras inicializado automaticamente');
                    }
                } catch (error) {
                    console.error('Erro ao inicializar VLibras:', error);
                }
            }, 2000);
        });
    </script>
</body>
</html>
